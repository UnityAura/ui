name: Package Zip

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create clean package zip
        run: |
          set -euo pipefail
          mkdir -p dist/ui
          rsync -a --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'dist/' \
            --exclude '*.zip' \
            ./ dist/ui/
          cd dist
          zip -r "ui-${GITHUB_REF_NAME:-local}.zip" ui

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-zip
          path: dist/*.zip
