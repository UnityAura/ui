name: PR Approval Gate

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]

permissions:
  pull-requests: read

jobs:
  require-approvals:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Enforce minimum approvals for non-owner PRs
        uses: actions/github-script@v7
        with:
          script: |
            const repoOwner = context.repo.owner.toLowerCase();
            const pr = context.payload.pull_request;
            const prAuthor = pr.user.login.toLowerCase();
            const minimumApprovals = 3;

            if (prAuthor === repoOwner) {
              core.info(`PR author (${pr.user.login}) is the repository owner. Skipping minimum approval check.`);
              return;
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100
            });

            const latestStateByReviewer = new Map();
            for (const review of reviews) {
              const userType = review.user?.type?.toLowerCase();
              if (!review.user || userType === "bot") {
                continue;
              }

              const reviewer = review.user.login.toLowerCase();
              if (reviewer === prAuthor) {
                continue;
              }

              latestStateByReviewer.set(reviewer, review.state);
            }

            const approvingReviewers = [...latestStateByReviewer.entries()]
              .filter(([, state]) => state === "APPROVED")
              .map(([reviewer]) => reviewer);

            core.info(`Unique approvals found: ${approvingReviewers.length} (${approvingReviewers.join(", ") || "none"})`);

            if (approvingReviewers.length < minimumApprovals) {
              core.setFailed(
                `This PR requires at least ${minimumApprovals} unique approvals. ` +
                `Current approvals: ${approvingReviewers.length}.`
              );
            }
